<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite de Aniversario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

.convite {
    width: 100%;
    max-width: 400px;
    position: relative;
}

.convite img {
    width: 100%;
    height: auto;
    display: block;
    /* SEM position absolute */
}

.selo-link {
    position: absolute;
    width: 70px;
    height: 70px;
    top: 570px;
    left: 164px;
    opacity: 0;
}

h1 {
    color: #ecabb4;
    position: absolute;
    font-family: "Noto Serif Display", serif;
    font-size: 23px;
    font-weight: normal;
    letter-spacing: 1px;
    line-height: 1.4;
    top: 310px;
    left: 42px;
}

p {
    color: #7f7353;
    position: absolute;
    font-family: "Noto Serif Display", serif;
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 1px;
    line-height: 1.4;
    top: 360px;
    left: 140px;
}

h2 {
    color: #ed919d;
    position: absolute;
    font-family: "Noto Serif Display", serif;
    font-size: 19px;
    font-weight: bold;
    letter-spacing: 1px;
    line-height: 1.4;
    top: 390px;
    left: 105px;
}

.texto-curvo {
    position: absolute;
    width: 150px;
    display: block;
    left: 50%;
    transform: translateX(-50%);
    top: 585px;
    pointer-events: none;
}

.texto-curvo text {
    font-family: 'Georgia', serif;
    font-size: 21px;
    fill: #ed919d;
    letter-spacing: 2px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="convite">
    <img src="./assets/img/CNT aniversario.png">

    <a href="./telaPrincipal.html" class="selo-link"></a>

    <h1>CONVITE DE ANIVERSÁRIO</h1>
    <p>está chegando!</p>
    <h2>16 DE MAIO 2026</h2>

    <svg class="texto-curvo" viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <path id="arcoAbaixo" d="M 30,20 A 70,70 0 0,0 230,20"/>
        </defs>
        <text>
            <textPath href="#arcoAbaixo" startOffset="50%" text-anchor="middle">
                TOQUE PARA ABRIR
            </textPath>
        </text>
    </svg>
</div>

</body>
</html>
