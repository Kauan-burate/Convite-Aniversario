    <title>Convite de Aniversario</title>
    <style>
        body {
            
            background-size: cover;        /* ocupa toda a tela */
            background-position: center;   /* centraliza */
            background-repeat: no-repeat;  /* não repete */
        }

        .convite {
            width: 360px;  
            width: 360px;
            height: 640px; /* altura do convite */
            background-image: url("convite.png");
            background-size: cover;
            background-position: center;
            position: relative;  
            
        }

        .convite img {
            width: 100%;       /* faz a imagem se ajustar */
            height: auto;      /* mantém proporção */
            border-radius: 10px; /* opcional (deixa bonito) */
        }

        .selo-link {
            position: absolute;
            
            bottom: 200px;
            top: 508px;
            right: 50px;
            left: 140px;
            width: 85px;
            height: 85px;
            opacity: 0;
            display: block;
    }
        






    </style>
</head>
<body>
    <div class="convite">
        <img src="./assets/img/Convite_de_Aniversario.png">

        <a href="./telaPrincipal.html" class="selo-link"> link interarivo</a>
        
    </div>

</body>
